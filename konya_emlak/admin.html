<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Öğren-Sat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-wrap">
  <div class="admin-header">
    <h1>Admin Panel</h1>
    <p>Öğren-Sat yönetim arayüzü</p>
  </div>
  <div class="admin-card">
    <div class="admin-card-title">📊 İstatistikler</div>
    <p style="color:var(--txm);font-size:14px;">Yakında: kullanıcı sayısı, ilan sayısı, değerleme sayısı, abonelik raporu.</p>
  </div>
  <div class="admin-card">
    <div class="admin-card-title">👥 Kullanıcılar</div>
    <p style="color:var(--txm);font-size:14px;">Yakında: kayıtlı kullanıcı listesi ve yönetim.</p>
  </div>
  <div class="admin-card">
    <div class="admin-card-title">🏠 İlanlar</div>
    <p style="color:var(--txm);font-size:14px;">Yakında: ilan ekle/düzenle/sil arayüzü.</p>
  </div>
  <div style="margin-top:32px;text-align:center;">
    <a href="/" style="color:var(--gold);font-size:14px;text-decoration:none;">← Ana Sayfaya Dön</a>
  </div>
</div>

</html>
